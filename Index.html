<!DOCTYPE html>
<html>
<head>
  <title>For Ponaah 💖</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8a8b8;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      width: 300px;
      padding: 30px 20px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .cat-img {
      width: 110px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      color: black;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      margin: 8px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: #ddd;
      position: relative;
    }

    #result {
      display: none;
      text-align: center;
    }

    #msg {
      color: black;
      font-size: 28px;
      font-weight: bold;
    }

    #msg::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,50%,100% { opacity: 1; }
      25%,75% { opacity: 0; }
    }

  </style>
</head>

<body>

<div class="card" id="card">
  <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" class="cat-img">

  <h2>Ameyaa, will you be my valentine? 💖</h2>

  <button id="yes" onclick="yesClick()">Yes 😍</button>
  <button id="no" onmouseover="moveNo()">No 😏</button>
</div>

<div id="result">
  <h1 id="msg"></h1>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" src="song.mp3"></audio>

<script>

function yesClick() {
  document.getElementById("card").style.display = "none";
  document.getElementById("result").style.display = "block";

  // 🎶 play music
  document.getElementById("music").play();

  let text = "Ponaah you are mine 🫣😌💖";
  let i = 0;

  document.getElementById("msg").innerText = "";

  function typeWriter() {
    if (i < text.length) {
      document.getElementById("msg").innerText += text.charAt(i);
      i++;
      setTimeout(typeWriter, 80);
    }
  }

  setTimeout(typeWriter, 500);
}

// 😏 NO BUTTON RUNS AWAY
function moveNo() {
  const btn = document.getElementById("no");

  btn.style.position = "fixed";
  btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
  btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
}

</script>

</body>
</html>
